# Apache MPM Prefork Configuration
# Optimized for Intel i5 Gen 13 + 64GB RAM
# Target: burst traffic ujian massal (300+ siswa serentak)

<IfModule mpm_prefork_module>
    StartServers             24
    MinSpareServers          25
    MaxSpareServers          80
    ServerLimit              800
    MaxRequestWorkers        800
    MaxConnectionsPerChild   12000
</IfModule>

# Alternative: MPM Event (better for high concurrency)
# Uncomment below and comment prefork above if using event MPM
# <IfModule mpm_event_module>
#     StartServers             4
#     MinSpareThreads          75
#     MaxSpareThreads          250
#     ThreadLimit              128
#     ThreadsPerChild          64
#     MaxRequestWorkers        512
#     MaxConnectionsPerChild   10000
# </IfModule>
