# Apache MPM Prefork Configuration
# Server: Intel i5 Gen 13 (16 threads) + 64GB RAM
# Target: burst traffic ujian massal (300+ siswa serentak)
#
# Memory calculation:
#   Each prefork worker = ~30-50MB (PHP + Apache)
#   500 workers × 40MB = ~20GB (within 24GB container limit)
#   Leaves headroom for queue workers (~1GB) and OS (~3GB)

<IfModule mpm_prefork_module>
    StartServers             32
    MinSpareServers          32
    MaxSpareServers          100
    ServerLimit              500
    MaxRequestWorkers        500
    MaxConnectionsPerChild   10000
</IfModule>
