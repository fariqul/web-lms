# Apache MPM Prefork Configuration
# Server: Intel i5 Gen 13 (16 threads) + 64GB RAM
# Target: burst traffic ujian massal (300+ siswa serentak)
#
# Memory calculation:
#   Each prefork worker = ~30-50MB (PHP + Apache)
#   384 workers × 40MB = ~15GB (within 16GB container limit)
#   Leaves headroom for queue workers (~1GB) and PHP overhead

<IfModule mpm_prefork_module>
    StartServers             24
    MinSpareServers          24
    MaxSpareServers          96
    ServerLimit              384
    MaxRequestWorkers        384
    MaxConnectionsPerChild   8000
</IfModule>
