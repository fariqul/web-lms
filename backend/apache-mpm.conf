# Apache MPM Prefork Configuration
# Optimized for Ryzen 5 5600 (12 threads) + 32GB RAM
# Target: 600-800 concurrent users

<IfModule mpm_prefork_module>
    StartServers             12
    MinSpareServers          15
    MaxSpareServers          40
    MaxRequestWorkers        500
    MaxConnectionsPerChild   10000
</IfModule>

# Alternative: MPM Event (better for high concurrency)
# Uncomment below and comment prefork above if using event MPM
# <IfModule mpm_event_module>
#     StartServers             4
#     MinSpareThreads          75
#     MaxSpareThreads          250
#     ThreadLimit              128
#     ThreadsPerChild          64
#     MaxRequestWorkers        512
#     MaxConnectionsPerChild   10000
# </IfModule>
