# Nginx Reverse Proxy for LMS Home Server
# Optimized for Intel i5 Gen 13 + 64GB RAM
# Target: 300+ concurrent students during exams
# Cloudflare Tunnel handles HTTPS — nginx only needs HTTP

# Upstream pools with keepalive for connection reuse
upstream backend_pool {
    server backend:80;
    keepalive 64;  # Reuse connections to Apache (critical for high concurrency)
}

upstream socket_pool {
    server socket:6001;
    keepalive 32;
}

upstream proctoring_pool {
    server proctoring:8001;
    keepalive 8;
}

server {
    listen 80;
    server_name _;

    # === General Settings ===
    client_max_body_size 100M;
    client_body_buffer_size 16k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # === Timeouts ===
    proxy_connect_timeout 60;
    proxy_send_timeout 300;
    proxy_read_timeout 300;
    send_timeout 300;

    # === Proxy Buffer Optimization ===
    # Prevents writing upstream responses to disk (temp files)
    proxy_buffer_size 8k;
    proxy_buffers 16 32k;
    proxy_busy_buffers_size 64k;

    # === Gzip Compression (reduce bandwidth — critical for home server) ===
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # === Socket.io WebSocket ===
    location /socket.io/ {
        proxy_pass http://socket_pool/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # Long timeout for WebSocket connections
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # === Internal broadcast endpoint for Socket.io ===
    location /broadcast {
        proxy_pass http://socket_pool/broadcast;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # === AI Proctoring Service ===
    location /proctoring/ {
        proxy_pass http://proctoring_pool/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30;
        client_max_body_size 1M;
    }

    # === Health check endpoint (for monitoring) ===
    location /nginx-health {
        access_log off;
        return 200 'healthy';
        add_header Content-Type text/plain;
    }

    # === Laravel API (high priority) ===
    location /api/ {
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_request_buffering off;
    }

    # === Laravel Storage — add caching headers for static files ===
    location /storage/ {
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # Cache static files (images, PDFs) for 7 days
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # === Laravel catch-all ===
    location / {
        proxy_pass http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_request_buffering off;
    }
}
